<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 문의 폼</title>
    <!-- Pretendard CDN 연결 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <!-- CSS 외부 링크 연결 -->
    <link rel="stylesheet" href="style.css">
    
    <!-- EmailJS SDK 로드 -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("vhEoJOLGvhLzigaFQ");
        })();
    </script>
</head>
<body>

<div class="email-form-container">
    <h2><span>CONTACT</span> ME</h2>
    <form id="contact-form">
        <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" placeholder="이름을 입력해주세요" required>
        </div>

        <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="example@domain.com" required>
        </div>

        <div class="form-group">
            <label for="subject">제목</label>
            <input type="text" id="subject" name="subject" placeholder="제목을 입력해주세요" required>
        </div>

        <div class="form-group">
            <label for="message">내용</label>
            <textarea id="message" name="message" placeholder="상세 내용을 입력해주세요" required></textarea>
        </div>

        <button type="submit" class="submit-btn">전송하기</button>
    </form>
</div>

<script type="text/javascript">
    document.getElementById('contact-form').addEventListener('submit', function(event) {
        event.preventDefault();

        const btn = document.querySelector('.submit-btn');
        const originalText = btn.textContent;
        
        btn.textContent = '전송 중...';
        btn.disabled = true;

        emailjs.sendForm('service_45y30h4', 'template_62w6ymz', this)
            .then(() => {
                alert('이메일이 성공적으로 전송되었습니다!');
                document.getElementById('contact-form').reset();
            }, (error) => {
                alert('전송에 실패했습니다: ' + JSON.stringify(error));
            })
            .finally(() => {
                btn.textContent = originalText;
                btn.disabled = false;
            });
    });
</script>

</body>
</html>
